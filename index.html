<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <div class="container">

        <div class="timer-container">
            <button id="pomodorobtn" class="active">Pomodoro</button>
            <button id="shortbreakbtn">Short Break</button>
            <button id="longbreakbtn">Long Break</button>
        </div>

        <div class="pomodoro-count">Completed Pomodoros: 0</div>

        <div class="progressbar">
            <div class="progressbar-inner">
                <h2 class="progressbar-number">25:00</h2>
            </div>
        </div>

        <div class="function-buttons">
            <button id="startbtn">Start</button>
            <button id="pausebtn">Pause</button>
            <button id="resetbtn">Reset</button>
        </div>

    </div>
    
    <script src="java.js"></script>
</body>
